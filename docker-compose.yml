services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 10 && ollama pull gemma2:2b && ollama pull nomic-embed-text && tail -f /dev/null"]

  rag-app:
    build: .
    container_name: rag-pipeline
    ports:
      - "8501:8501"
    volumes:
      - chroma_data:/app/chroma_db
    environment:
      - OLLAMA_HOST=http://ollama:11434
    depends_on:
      - ollama
    restart: unless-stopped

volumes:
  ollama_data:
  chroma_data: